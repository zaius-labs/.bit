name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross
      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release -p bit-lang-cli --target ${{ matrix.target }}
          else
            cargo build --release -p bit-lang-cli --target ${{ matrix.target }}
          fi
        shell: bash
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../../../bit-lang-${{ matrix.target }}.zip bit.exe
          else
            tar czf ../../../bit-lang-${{ matrix.target }}.tar.gz bit
          fi
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: bit-lang-${{ matrix.target }}
          path: bit-lang-${{ matrix.target }}.*

  publish-github:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: bit-lang-*/*

  publish-crates:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p bit-lang-core
          sleep 30
          cargo publish -p bit-lang-store
          sleep 30
          cargo publish -p bit-lang-cli

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: wasm-pack build crates/bit-wasm --target web
      - name: Configure npm package
        run: |
          cd crates/bit-wasm/pkg
          # Override wasm-pack's generated package.json with our name
          node -e "
            const pkg = require('./package.json');
            pkg.name = 'bit-lang';
            pkg.description = 'The .bit language toolkit — parse, validate, render, and convert .bit documents';
            pkg.repository = { type: 'git', url: 'https://github.com/zaius-labs/dotbit' };
            pkg.license = 'MIT';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2));
          "
      - name: Publish to npm
        run: cd crates/bit-wasm/pkg && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
